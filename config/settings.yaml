# 全局设置
log_sources:
  - path: "/var/log/nginx/access.log"
    parser: "nginx"
    encoding: "utf-8"
  - path: "/var/log/app/node.log"
    parser: "node"
    encoding: "utf-8"
  - path: "/var/log/app/django.log"
    parser: "python"
    encoding: "utf-8"

slow_request:
  warning_ms: 1000.0
  critical_ms: 5000.0

auth:
  enabled: false
  allowed_users: []
  require_sudo: false

# 告警通知配置
notification:
  enabled: false
  min_level: "error"
  cooldown_seconds: 300
  channels: []
  email:
    enabled: false
    smtp_host: "smtp.example.com"
    smtp_port: 587
    smtp_user: "alert@example.com"
    smtp_password: ""
    smtp_password_env: "LOG_INSPECTOR_SMTP_PASSWORD"
    use_tls: true
    use_ssl: false
    ssl_certfile: ""
    ssl_keyfile: ""
    from_addr: "alert@example.com"
    to_addrs: []
  webhook:
    enabled: false
    url: ""
    method: "POST"
    headers: {}
    secret: ""
  dingtalk:
    enabled: false
    webhook_url: ""
    secret: ""

# 实时监控配置
watch:
  poll_interval_ms: 500
  buffer_size: 8192
  max_lines_per_second: 10000
  show_unmatched: false
  highlight_rules: true

# 远程日志源配置（传输强制 TLS 加密）
remote_sources: []
